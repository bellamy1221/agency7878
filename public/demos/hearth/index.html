<body>
  <!-- Keep the application viewport separate from the shared .center utility class. -->
  <style id="hearth-layout-fixes">
    .workspace > main.center {
      min-width: 0;
      min-height: 0;
      align-items: stretch;
      justify-content: flex-start;
    }

    .workspace > main.center > .content,
    .today-root,
    .today-inner,
    .today-topgrid,
    .today-main,
    .today-bottom,
    .today-timeline-col,
    .today-inbox-col {
      min-width: 0;
    }

    .workspace > main.center > .content {
      width: 100%;
      align-self: stretch;
    }

    .today-inner {
      width: 100%;
    }

    .today-main,
    .today-bottom {
      grid-template-columns: minmax(0, 1.4fr) minmax(0, 1fr);
    }

    @media (max-width: 1240px) {
      .context {
        width: min(260px, 25vw);
      }
    }

    @media (max-width: 980px) {
      .context {
        display: none;
      }

      .today-inner {
        padding-inline: 20px;
      }
    }

    @media (max-width: 680px) {
      .sidebar {
        width: 0;
        border-right: 0;
      }

      .today-inner {
        padding: 16px 14px 72px;
      }

      .today-head {
        align-items: flex-start;
        flex-direction: column;
      }

      .today-topgrid,
      .today-main,
      .today-bottom {
        grid-template-columns: minmax(0, 1fr);
      }

      .momentum-card {
        grid-column: auto;
      }
    }
  </style>
    <div id="root"></div>
  </body>
